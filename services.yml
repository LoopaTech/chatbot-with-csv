apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${GCP_APPLICATION}
  annotations:
    run.googleapis.com/description: ${GCP_PROJECT}
    # Externally available
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "1"
        autoscaling.knative.dev/minScale: "0"
    spec:
      containers:
        - name: chatbot-with-csv
          image: gcr.io/${GCP_PROJECT}/chatbot-with-csv:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: API_OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: API_OPENAI_KEY
            - name: CHAINLIT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: CHAINLIT_AUTH_SECRET
            - name: VENTAS_CSV_PATH
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: VENTAS_CSV_PATH
            - name: INVENTARIO_CSV_PATH
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: INVENTARIO_CSV_PATH
            - name: JOIN_VENTAS_INVENTARIO_CSV_PATH
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: JOIN_VENTAS_INVENTARIO_CSV_PATH
            - name: CHAINLIT_COOKIE_SAMESITE
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: CHAINLIT_COOKIE_SAMESITE
          volumeMounts:
            - name: gcs-1
              mountPath: /db
      timeoutSeconds: 300
      containerConcurrency: 150
      volumes:
        - name: gcs-1
          csi:
            driver: gcsfuse.run.googleapis.com
            volumeAttributes:
              bucketName: loopa-rag-csv-bucket